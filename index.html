<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПРОТОКОЛ УНИЧТОЖЕНИЯ: АКТИВЕН</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            text-shadow: 2px 0px 1px rgba(255,0,0,0.7), -2px 0px 1px rgba(0,0,255,0.7);
        }

        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            z-index: 3;
            position: relative;
            max-width: 800px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .warning-text {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ffaa00;
        }

        /* --- ДИЗАЙН БОМБЫ --- */
        .c4-bomb {
            position: relative;
            margin: 20px 0 40px 0;
            width: 380px;
        }

        .wires {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 1;
        }

        .wire {
            width: 12px;
            height: 60px;
            border-radius: 5px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.7);
        }
        .wire-red { background: #d00; }
        .wire-blue { background: #00d; }
        .wire-yellow { background: #dd0; }

        .bomb-body {
            background: #111;
            border: 6px solid #333;
            border-radius: 8px;
            padding: 20px;
            box-shadow: inset 0 0 40px #000, 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #timer {
            font-size: 6rem;
            color: #ff2a2a;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.9), 3px 0px 2px rgba(0,255,255,0.7);
            background: #0a0a0a;
            padding: 10px 20px;
            border: 2px solid #222;
            border-radius: 5px;
            animation: glitch 2.5s infinite;
        }

        .tick {
            opacity: 0.6;
        }

        /* --- КНОПКИ --- */
        .btn-group {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        button {
            background: transparent;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
            text-shadow: 2px 0px 1px rgba(255,0,0,0.7);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
            z-index: 4;
        }

        button:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
            text-shadow: none;
        }

        #message {
            font-size: 1.8rem;
            display: none;
            margin-top: 30px;
            animation: blink 1.5s infinite;
        }

        /* --- АНИМАЦИИ --- */
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 1px) }
            40% { transform: translate(-2px, -1px) }
            60% { transform: translate(2px, 1px) }
            80% { transform: translate(2px, -1px) }
            100% { transform: translate(0) }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Анимация тряски экрана при взрыве */
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* Эффект огненной вспышки */
        .explosion-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #ffffff 10%, #ffcc00 30%, #ff0000 70%, #000000 100%);
            opacity: 0;
            z-index: 9999;
            pointer-events: none;
        }

        .boom-active {
            animation: blast 1.5s forwards;
        }

        @keyframes blast {
            0% { opacity: 0; transform: scale(0.5); }
            10% { opacity: 1; transform: scale(1.2); }
            30% { opacity: 1; background: #fff; }
            100% { opacity: 1; background: #000; }
        }
    </style>
</head>
<body>

    <div class="container" id="main">
        <h1>> СИСТЕМА УНИЧТОЖЕНИЯ АКТИВИРОВАНА_</h1>
        <p class="warning-text">КРИТИЧЕСКАЯ УГРОЗА. БОЕГОЛОВКА ВЗВЕДЕНА.</p>
        
        <div class="c4-bomb" id="bomb">
            <div class="wires">
                <div class="wire wire-red"></div>
                <div class="wire wire-blue"></div>
                <div class="wire wire-yellow"></div>
            </div>
            <div class="bomb-body">
                <div id="timer">01:00</div>
            </div>
        </div>
        
        <p>ТРЕБУЕТСЯ ВВОД ДАННЫХ ДЛЯ ПРЕДОТВРАЩЕНИЯ ВЗРЫВА:</p>
        
        <div class="btn-group" id="buttons">
            <button onclick="defuse('sasha')">Любить Сашу</button>
            <button onclick="defuse('mark')">Отдать Марка</button>
        </div>

        <div id="message"></div>
    </div>

    <script>
        let time = 60; // Изменено на 1 минуту
        const timerEl = document.getElementById('timer');
        const buttonsEl = document.getElementById('buttons');
        const messageEl = document.getElementById('message');
        const bombEl = document.getElementById('bomb');
        let interval;

        function updateTimer() {
            let m = Math.floor(time / 60).toString().padStart(2, '0');
            let s = (time % 60).toString().padStart(2, '0');
            
            // Имитация пиканья через визуальное мигание таймера
            timerEl.classList.add('tick');
            setTimeout(() => timerEl.classList.remove('tick'), 100);

            timerEl.innerText = `${m}:${s}`;
            
            if (time <= 0) {
                clearInterval(interval);
                explode();
            }
            time--;
        }

        function explode() {
            // Тряска экрана
            document.body.style.animation = "shake 0.3s infinite";
            
            // Создаем вспышку
            let flash = document.createElement("div");
            flash.className = "explosion-overlay boom-active";
            document.body.appendChild(flash);

            // Через 1.2 секунды убираем интерфейс и оставляем черный экран с ошибкой
            setTimeout(() => {
                document.body.style.animation = "none";
                document.body.style.backgroundColor = "#000";
                document.body.innerHTML = `
                    <div style="z-index: 10000; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh;">
                        <h1 style="color: red; font-size: 3rem; text-shadow: none;">СВЯЗЬ ПОТЕРЯНА</h1>
                        <p style="color: #666; font-size: 1.5rem;">> Объект уничтожен.</p>
                    </div>`;
            }, 1200);
        }

        function defuse(choice) {
            clearInterval(interval);
            buttonsEl.style.display = 'none';
            messageEl.style.display = 'block';
            timerEl.style.animation = 'none';
            timerEl.style.color = "#0f0";
            timerEl.style.textShadow = "0 0 10px #0f0";

            if(choice === 'sasha') {
                messageEl.innerHTML = "ВЫБОР ПРИНЯТ.<br>ЛЮБОВЬ К САШЕ ПОДТВЕРЖДЕНА.<br>БОМБА ОБЕЗВРЕЖЕНА.";
                bombEl.style.opacity = "0.5";
            } else if (choice === 'mark') {
                messageEl.innerHTML = "ЖЕРТВА ПРИНЯТА.<br>МАРК ОТДАН СИСТЕМЕ.<br>ПРОТОКОЛ ОТМЕНЕН.";
                messageEl.style.color = "#ff2a2a";
                timerEl.style.color = "#ff2a2a";
                timerEl.style.textShadow = "0 0 10px #ff2a2a";
                bombEl.style.opacity = "0.5";
            }
        }

        // Запуск таймера
        interval = setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
