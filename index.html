<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПРОТОКОЛ УНИЧТОЖЕНИЯ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            /* Хроматическая аберрация в стиле VHS */
            text-shadow: 2px 0px 1px rgba(255,0,0,0.7), -2px 0px 1px rgba(0,0,255,0.7);
        }

        /* Эффект старого телевизора (сканлайны) */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            z-index: 3;
            position: relative;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        #timer {
            font-size: 7rem;
            color: #ff2a2a;
            margin: 20px 0;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.8), 3px 0px 2px rgba(0,255,255,0.7);
            animation: glitch 2s infinite;
        }

        .tick {
            opacity: 0.5;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .btn-group {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        button {
            background: transparent;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
            text-shadow: 2px 0px 1px rgba(255,0,0,0.7);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        button:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
            text-shadow: none;
        }

        #message {
            font-size: 1.8rem;
            display: none;
            margin-top: 30px;
            animation: blink 1.5s infinite;
        }

        /* Анимация глитча для таймера */
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-3px, 2px) }
            40% { transform: translate(-3px, -2px) }
            60% { transform: translate(3px, 2px) }
            80% { transform: translate(3px, -2px) }
            100% { transform: translate(0) }
        }

        /* Анимация мигания текста */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="container" id="main">
        <h1>> СИСТЕМА УНИЧТОЖЕНИЯ АКТИВИРОВАНА_</h1>
        <p>КРИТИЧЕСКАЯ УГРОЗА. ДО ВЗРЫВА ОСТАЛОСЬ:</p>
        
        <div id="timer">05:00</div>
        
        <p>ТРЕБУЕТСЯ ВВОД ДАННЫХ ДЛЯ ПРЕДОТВРАЩЕНИЯ ВЗРЫВА:</p>
        
        <div class="btn-group" id="buttons">
            <button onclick="defuse('sasha')">Любить Сашу</button>
            <button onclick="defuse('mark')">Отдать Марка</button>
        </div>

        <div id="message"></div>
    </div>

    <script>
        let time = 60; // 5 минут в секундах
        const timerEl = document.getElementById('timer');
        const buttonsEl = document.getElementById('buttons');
        const messageEl = document.getElementById('message');
        let interval;

        function updateTimer() {
            let m = Math.floor(time / 60).toString().padStart(2, '0');
            let s = (time % 60).toString().padStart(2, '0');
            
            // Имитация пиканья через визуальное мигание таймера
            timerEl.classList.add('tick');
            setTimeout(() => timerEl.classList.remove('tick'), 100);

            timerEl.innerText = `${m}:${s}`;
            
            if (time <= 0) {
                clearInterval(interval);
                explode();
            }
            time--;
        }

        function explode() {
            document.body.style.backgroundColor = "white";
            setTimeout(() => {
                document.body.style.backgroundColor = "#000";
                document.getElementById('main').innerHTML = '<h1 style="color:red; font-size:4rem; text-shadow:none;">СИГНАЛ ПОТЕРЯН</h1>';
            }, 100);
        }

        function defuse(choice) {
            clearInterval(interval);
            buttonsEl.style.display = 'none';
            messageEl.style.display = 'block';
            timerEl.style.animation = 'none';
            timerEl.style.color = "#0f0";
            timerEl.style.textShadow = "0 0 10px #0f0";

            if(choice === 'sasha') {
                messageEl.innerHTML = "ВЫБОР ПРИНЯТ.<br>ЛЮБОВЬ К САШЕ ПОДТВЕРЖДЕНА.<br>БОМБА ОБЕЗВРЕЖЕНА.";
            } else if (choice === 'mark') {
                messageEl.innerHTML = "ЖЕРТВА ПРИНЯТА.<br>МАРК ОТДАН СИСТЕМЕ.<br>ПРОТОКОЛ ОТМЕНЕН.";
                messageEl.style.color = "#ff2a2a";
                timerEl.style.color = "#ff2a2a";
                timerEl.style.textShadow = "0 0 10px #ff2a2a";
            }
        }

        // Запуск таймера
        interval = setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
